<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>News | Noi Tatsuzaki</title>
    <link rel="stylesheet" href="{{ '/style.css' | relative_url }}" />
  </head>
  <body data-base-path=".." data-site-baseurl="{{ site.baseurl }}">
    <div id="site-header-placeholder"></div>

    <main class="page">
      <div
        class="debugGrid"
        id="newsGrid"
        aria-label="News page grid (12 columns)"
      ></div>
    </main>

    <div id="site-footer-placeholder"></div>

    <script id="latest-news-data" type="application/json">
      [
      {% assign latest_news = site.pages | where_exp: "p", "p.path contains 'content/news/'" | sort: "date" | reverse %}
      {% for post in latest_news limit:60 %}
{% include news-json-entry.html post=post %}{% unless forloop.last %},{% endunless %}
      {% endfor %}
      ]
    </script>

    <script src="{{ '/layout-loader.js' | relative_url }}" defer></script>
    <script src="{{ '/news-grid.js' | relative_url }}" defer></script>
  </body>
</html>
