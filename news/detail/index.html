---
layout: null
---
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script>
      (function () {
        try {
          var k = "portfolio-lang";
          var v = localStorage.getItem(k);
          if (v === "en" || v === "ja") document.documentElement.setAttribute("lang", v);
        } catch (e) {}
      })();
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sample article | News | Noi Tatsuzaki</title>
    <link rel="stylesheet" href="{{ '/style.css' | relative_url }}" />
  </head>
  <body data-base-path="../.." data-site-baseurl="{{ site.baseurl }}">
    <script>
      (function () {
        try {
          var path = location.pathname;
          var i = path.indexOf("/news/");
          var base = i > 0 ? path.slice(0, i) : "";
          document.body.setAttribute("data-site-baseurl", base);
        } catch (e) {
          document.body.setAttribute("data-site-baseurl", "");
        }
      })();
    </script>
    <div id="site-header-placeholder"></div>

    <main class="page">
      <div
        class="debugGrid"
        id="newsDetailGrid"
        aria-label="News article grid (12 columns, sample layout)"
      ></div>
    </main>

    <div id="site-footer-placeholder"></div>

    <script id="latest-news-data" type="application/json">
      [
      {% assign latest_news = site.pages | where_exp: "p", "p.path contains 'content/news/'" %}
      {% for post in latest_news limit:60 %}
{% include news-json-entry.html post=post %}{% unless forloop.last %},{% endunless %}
      {% endfor %}
      ]
    </script>

    <script src="{{ '/layout-loader.js' | relative_url }}" defer></script>
    <script src="{{ '/lang-toggle.js' | relative_url }}" defer></script>
    <script src="{{ '/news-detail-grid.js' | relative_url }}" defer></script>
  </body>
</html>
