<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Noi Tatsuzaki</title>
    <meta
      name="description"
      content="Building robots, systems, and future concepts driven by curiosity."
    />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Oxanium:wght@400;600;700&family=Roboto:wght@300;400;500;700&display=swap"
      rel="stylesheet"
    />

    <style>
      /* =========================
         Design System (Tokens)
         ========================= */
      :root {
        /* layout */
        --page-gutter: 48px; /* minimum outside margin = 3x (was 16px) */
        --grid-columns: 12; /* enables 4-up (span 3) and 3-up (span 4) */
        --grid-gap: 0px; /* no gaps; use 1px lines instead */
        --content-max: 1200px; /* caps width on ultrawide screens */
        --row-header-w: 48px;

        /* spacing (8px system) */
        --space-0: 0px;
        --space-1: 8px;
        --space-2: 16px;
        --space-3: 24px;
        --space-4: 32px;
        --space-5: 40px;
        --space-6: 48px;
        --space-7: 56px;
        --space-8: 64px;
        --space-10: 80px;
        --space-12: 96px;

        /* typography */
        --font-title: "Glitch Demo", "Oxanium", system-ui, sans-serif;
        --font-name: "Shibuya Zero", "Oxanium", system-ui, sans-serif;
        --font-sub-title: "Oxanium", system-ui, sans-serif;
        --font-text: "Roboto", system-ui, -apple-system, "Segoe UI", sans-serif;

        --fs-00: 11px;
        --fs-0: 12px;
        --fs-1: 14px;
        --fs-2: 16px;
        --fs-3: 20px;
        --fs-4: 24px;
        --fs-5: 32px;
        --fs-6: 40px;
        --fs-7: 56px;

        --lh-tight: 1.05;
        --lh-solid: 1.15;
        --lh-base: 1.6;

        --track-tight: 0.02em;
        --track-tech: 0.12em;
        --track-title: 0.08em;

        /* color */
        --c-bg: #e4e4e4;
        --c-surface: #ffffff;
        --c-ink: #000000;
        --c-muted: #1a1a1a;
        --c-accent: #48b7d5;
        --c-border: #606060; /* strict */

        /* component */
        --border: 1px solid var(--c-border);
        --radius: 0px; /* no border radius */

        /* debug */
        --addr: 1; /* show block address labels */
      }

      /* =========================
         Base
         ========================= */
      * {
        box-sizing: border-box;
      }

      html,
      body {
        height: 100%;
      }

      body {
        margin: 0;
        background: var(--c-bg);
        color: var(--c-ink);
        font-family: var(--font-text);
        font-size: var(--fs-2);
        line-height: var(--lh-base);
      }

      a {
        color: inherit;
        text-decoration: none;
      }

      a:hover {
        text-decoration: underline;
        text-decoration-thickness: 1px;
        text-underline-offset: 3px;
      }

      /* =========================
         Grid System (Strict)
         ========================= */
      .page {
        max-width: var(--content-max);
        width: 100%;
        margin: 0 auto;
        padding-left: var(--page-gutter);
        padding-right: var(--page-gutter);
        padding-top: var(--space-3);
        padding-bottom: var(--space-10);
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(var(--grid-columns), minmax(0, 1fr));
        column-gap: var(--grid-gap);
        row-gap: var(--grid-gap);
        align-items: start;
      }

      .col-12 {
        grid-column: span 12;
      }
      .col-8 {
        grid-column: span 8;
      }
      .col-6 {
        grid-column: span 6;
      }
      .col-4 {
        grid-column: span 4;
      } /* 3-up: thirds */
      .col-3 {
        grid-column: span 3;
      } /* 4-up: quarters */

      @media (max-width: 900px) {
        .col-8,
        .col-6,
        .col-4,
        .col-3 {
          grid-column: span 12;
        }
      }

      /* =========================
         Reusable Components
         ========================= */
      .card {
        background: var(--c-surface);
        border: none; /* borders handled by gridlined separators */
        border-radius: var(--radius);
        padding: var(--space-3);
      }

      .section {
        border: none; /* borders handled by gridlined separators */
        border-radius: var(--radius);
        background: var(--c-surface);
      }

      .section__head {
        border-bottom: none; /* avoid double borders; handled by inner gridlines */
        padding: var(--space-2) var(--space-3);
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        gap: var(--space-2);
      }

      .section__body {
        padding: var(--space-3);
      }

      .title-xl {
        margin: 0;
        font-family: var(--font-title);
        font-size: var(--fs-7);
        line-height: var(--lh-tight);
        letter-spacing: var(--track-title);
        text-transform: uppercase;
      }

      .title-lg {
        margin: 0;
        font-family: var(--font-sub-title);
        font-size: var(--fs-5);
        line-height: var(--lh-solid);
        letter-spacing: var(--track-tech);
        text-transform: uppercase;
      }

      .label {
        font-size: var(--fs-0);
        letter-spacing: var(--track-tech);
        text-transform: uppercase;
      }

      .accent {
        color: var(--c-accent);
      }

      .divider-accent {
        height: 8px;
        background: var(--c-accent);
        border: none;
        border-radius: var(--radius);
      }

      .mono {
        font-family: var(--font-sub-title);
        letter-spacing: var(--track-tech);
        text-transform: uppercase;
      }

      /* =========================
         Rectangle (placed blocks)
         =========================
         Rule:
         - always 1px #606060 border
         - default fill: white
         - can override fill with modifier classes
      */
      .rect {
        border: var(--border);
        border-radius: var(--radius);
        background: var(--c-surface);
      }

      .rect--bg {
        background: var(--c-bg);
      }

      .rect--black {
        background: #000;
        color: #fff;
      }

      .rect--accent {
        background: var(--c-accent);
        color: #000;
      }

      .rect--no-left {
        border-left-color: transparent;
      }

      /* =========================
         Debug grid (A-L x 1..)
         ========================= */
      .debugGrid {
        display: grid;
        grid-template-columns: var(--row-header-w) repeat(12, minmax(0, 1fr));
        /* rows are set by JS to allow per-row heights */
        gap: 0;
        border-top: var(--border);
        border-left: var(--border);
        background: var(--c-bg);
        position: relative;
        isolation: isolate; /* create a predictable stacking context */
      }

      .dgCell {
        border-right: var(--border);
        border-bottom: var(--border);
        display: grid;
        place-items: center;
        font-family: var(--font-sub-title);
        letter-spacing: var(--track-tech);
        text-transform: uppercase;
        font-size: var(--fs-0);
        color: rgba(0, 0, 0, 0.72);
        user-select: none;
      }

      .dgHead {
        background: var(--c-bg);
        color: rgba(0, 0, 0, 0.85);
      }

      .dgCorner {
        background: var(--c-bg);
      }

      .dgRow {
        background: var(--c-bg);
      }

      .dgBody {
        background: var(--c-bg);
      }

      .dgMerge {
        background: transparent; /* allow background image behind */
        font-size: var(--fs-0);
        color: rgba(0, 0, 0, 0.8);
        display: block; /* avoid dgCell grid centering behavior */
        overflow: hidden; /* never bleed outside merged cell */
      }

      .dgWhite {
        background: #ffffff;
      }

      .dgBlack {
        background: #000000;
        color: rgba(255, 255, 255, 0.92);
      }

      .dgClear {
        background: transparent;
      }

      .dgBg {
        position: relative;
        z-index: -2; /* behind everything */
        border-right: none;
        border-bottom: none;
        padding: 0;
        overflow: hidden;
        background-position: center;
        background-size: cover;
        background-repeat: no-repeat;
      }

      .debugGrid > .dgCell {
        position: relative;
        z-index: 0; /* grid lines live here (below overlay rectangles) */
      }

      .dgOverlay {
        position: relative;
        z-index: 2; /* above grid lines */
        border-right: none;
        border-bottom: none;
        padding: 0;
        background: transparent;
        pointer-events: none;
      }

      /* =========================
         Cell content presets
         ========================= */
      .dgMergeContent {
        width: 100%;
        height: 100%;
        padding: var(--merge-pad, 10px); /* default inset */
        display: flex;
        align-items: center; /* vertical center */
        justify-content: flex-start; /* left aligned */
        box-sizing: border-box;
      }

      .dgMergeContent--23 {
        --merge-pad: 23px;
      }

      .dgMergeContent--23pt {
        --merge-pad: 23pt;
      }

      .dgHeroTitle {
        font-family: var(--font-title);
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: var(--track-title);
        line-height: 0.92;
        font-size: 84px; /* will be auto-fit by JS */
        color: var(--c-ink);
        max-width: 100%;
      }

      .dgHeroTitle > span {
        display: block;
        white-space: nowrap; /* keep exactly 2 lines */
      }

      .dgInsetRect {
        width: 100%;
        height: 100%;
      }

      .dgOverlayFill {
        width: 100%;
        height: 100%;
        padding: 0;
        display: flex;
        align-items: stretch;
        justify-content: flex-start;
      }

      /* A..E center = 4.5 columns of 5 columns => 90% */
      .dgRectToEcenter {
        width: 90%;
        height: 100%;
      }
    </style>
  </head>

  <body>
    <main class="page">
      <div class="debugGrid" id="debugGrid" aria-label="Grid address map"></div>
    </main>

    <script>
      (function () {
        const COLS = 12; // A-L
        const ROWS = 27; // extended as needed
        const BASE_ROW_PX = 56; // 7 * 8 (8px system)
        const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("").slice(0, COLS);

        const root = document.getElementById("debugGrid");
        if (!root) return;

        // Row height rules (Excel-like row numbers):
        // - Row 1: base * 5
        // - Row 2: base * 2
        // - Row 4: base * 2.5
        // - Others: base
        const multiplierByRow = new Map([
          [1, 5],
          [2, 2],
          [4, 2.5],
          [6, 1.8],
          [7, 2],
          [8, 2],
          [10, 4],
          [12, 5],
          [15, 4],
          [17, 5],
          [19, 2],
          [20, 5],
          [21, 1.5],
          [22, 3.5],
          [24, 2],
          [26, 7],
        ]);

        const rowHeights = [`${BASE_ROW_PX}px`]; // header row (A-L)
        for (let r = 1; r <= ROWS; r++) {
          const mul = multiplierByRow.get(r) ?? 1;
          rowHeights.push(`${BASE_ROW_PX * mul}px`);
        }
        root.style.gridTemplateRows = rowHeights.join(" ");

        const frag = document.createDocumentFragment();

        const makeCell = (cls, text) => {
          const el = document.createElement("div");
          el.className = cls;
          if (text !== undefined) el.textContent = text;
          return el;
        };

        const colIndex = (letter) => {
          const idx = letters.indexOf(letter.toUpperCase());
          if (idx < 0) throw new Error(`Invalid column: ${letter}`);
          return idx + 1; // 1..12
        };

        const parseRef = (ref) => {
          const m = String(ref).trim().match(/^(\d+)([A-Za-z])$/);
          if (!m) throw new Error(`Invalid ref: ${ref}`);
          return { row: Number(m[1]), col: colIndex(m[2]) };
        };

        const mergeSpecs = [
          {
            from: "1A",
            to: "1F",
            cls: "dgWhite",
            html:
              '<div class="dgMergeContent dgMergeContent--23pt"><div class="dgHeroTitle" data-fit="hero-title"><span>BUILDING</span><span>THE FUTURE.</span></div></div>',
          },
          { from: "1G", to: "2I", cls: "" },
          { from: "1J", to: "2L", cls: "" },
          { from: "2A", to: "2F", cls: "" },
          { from: "3A", to: "3L", cls: "dgBlack" },
          { from: "4A", to: "4D", cls: "dgWhite" },
          { from: "4E", to: "4H", cls: "dgWhite" },
          { from: "4I", to: "4L", cls: "dgWhite" },
          { from: "5A", to: "5C", cls: "" },
          { from: "5D", to: "5F", cls: "" },
          { from: "5G", to: "5I", cls: "" },
          { from: "5J", to: "5L", cls: "" },
          { from: "6A", to: "6F", cls: "dgWhite" },
          { from: "6G", to: "6I", cls: "" },
          { from: "6J", to: "6L", cls: "" },
          { from: "7A", to: "8C", cls: "" },
          { from: "7D", to: "8F", cls: "" },
          { from: "7G", to: "7I", cls: "dgWhite" },
          { from: "7J", to: "7L", cls: "dgWhite" },
          { from: "8G", to: "8I", cls: "dgWhite" },
          { from: "8J", to: "8L", cls: "dgWhite" },
          { from: "9A", to: "13C", cls: "" },
          { from: "9D", to: "13F", cls: "" },
          { from: "9G", to: "13I", cls: "" },
          { from: "9J", to: "13L", cls: "" },
          { from: "14A", to: "18C", cls: "" },
          { from: "14D", to: "18F", cls: "" },
          { from: "14G", to: "18I", cls: "" },
          { from: "14J", to: "18L", cls: "" },
          { from: "19A", to: "19C", cls: "dgWhite" },
          { from: "20A", to: "20C", cls: "" },
          { from: "19D", to: "20L", cls: "" },
          { from: "21A", to: "22F", cls: "" },
          { from: "21G", to: "22L", cls: "" },
          { from: "23A", to: "23C", cls: "" },
          { from: "23D", to: "23F", cls: "" },
          { from: "23G", to: "23I", cls: "" },
          { from: "23J", to: "23L", cls: "" },
          { from: "24A", to: "24F", cls: "dgWhite" },
          { from: "24G", to: "24I", cls: "" },
          { from: "24J", to: "24L", cls: "" },
          { from: "25A", to: "27C", cls: "" },
          { from: "25D", to: "27F", cls: "" },
          { from: "25G", to: "27I", cls: "" },
          { from: "25J", to: "27L", cls: "" },
        ];

        const covered = new Set();
        const key = (r, c) => `${r}:${c}`;
        const inRange = (r, c, r1, c1, r2, c2) =>
          r >= r1 && r <= r2 && c >= c1 && c <= c2;

        const bgSpecs = [
          { from: "9A", to: "13L", img: "public/images/featured-works.png" },
          { from: "14A", to: "18L", img: "public/images/bg-purple.png" },
        ];

        const overlayRects = [
          {
            from: "1G",
            to: "2L",
            html:
              '<div class="dgMergeContent dgMergeContent--23"><div class="rect dgInsetRect"></div></div>',
          },
          {
            from: "2A",
            to: "2F",
            html:
              '<div class="dgMergeContent dgMergeContent--23"><div class="rect dgInsetRect"></div></div>',
          },
          {
            from: "10A",
            to: "10E",
            html:
              '<div class="dgOverlayFill"><div class="rect rect--no-left dgRectToEcenter"></div></div>',
          },
          {
            from: "15A",
            to: "15E",
            html:
              '<div class="dgOverlayFill"><div class="rect rect--no-left dgRectToEcenter"></div></div>',
          },
        ];

        // headers
        const corner = makeCell("dgCell dgHead dgCorner", "");
        corner.style.gridRow = "1";
        corner.style.gridColumn = "1";
        frag.appendChild(corner);

        for (let c = 1; c <= COLS; c++) {
          const el = makeCell("dgCell dgHead", letters[c - 1]);
          el.style.gridRow = "1";
          el.style.gridColumn = String(1 + c); // + row header column
          frag.appendChild(el);
        }

        for (let r = 1; r <= ROWS; r++) {
          const el = makeCell("dgCell dgHead dgRow", String(r));
          el.style.gridRow = String(1 + r); // + header row
          el.style.gridColumn = "1";
          frag.appendChild(el);
        }

        // background images (behind grid lines)
        for (const bg of bgSpecs) {
          const a = parseRef(bg.from);
          const b = parseRef(bg.to);
          const r1 = Math.min(a.row, b.row);
          const r2 = Math.max(a.row, b.row);
          const c1 = Math.min(a.col, b.col);
          const c2 = Math.max(a.col, b.col);

          const el = makeCell("dgBg", "");
          el.style.gridRow = `${1 + r1} / ${1 + r2 + 1}`;
          el.style.gridColumn = `${1 + c1} / ${1 + c2 + 1}`;
          el.style.backgroundImage = `url("${bg.img}")`;
          frag.appendChild(el);
        }

        // overlay rectangles (above cell fills, below grid lines)
        for (const ov of overlayRects) {
          const a = parseRef(ov.from);
          const b = parseRef(ov.to);
          const r1 = Math.min(a.row, b.row);
          const r2 = Math.max(a.row, b.row);
          const c1 = Math.min(a.col, b.col);
          const c2 = Math.max(a.col, b.col);

          const el = makeCell("dgOverlay", "");
          el.style.gridRow = `${1 + r1} / ${1 + r2 + 1}`;
          el.style.gridColumn = `${1 + c1} / ${1 + c2 + 1}`;
          el.innerHTML = ov.html;
          frag.appendChild(el);
        }

        // merges
        for (const spec of mergeSpecs) {
          const a = parseRef(spec.from);
          const b = parseRef(spec.to);
          const r1 = Math.min(a.row, b.row);
          const r2 = Math.max(a.row, b.row);
          const c1 = Math.min(a.col, b.col);
          const c2 = Math.max(a.col, b.col);

          for (let r = r1; r <= r2; r++) {
            for (let c = c1; c <= c2; c++) covered.add(key(r, c));
          }

          const el = makeCell(`dgCell dgMerge ${spec.cls}`.trim(), "");
          if (spec.html) {
            el.innerHTML = spec.html;
          } else {
            el.textContent = `${spec.from}:${spec.to}`;
          }
          el.style.gridRow = `${1 + r1} / ${1 + r2 + 1}`;
          el.style.gridColumn = `${1 + c1} / ${1 + c2 + 1}`;
          frag.appendChild(el);
        }

        // remaining body cells
        for (let r = 1; r <= ROWS; r++) {
          for (let c = 1; c <= COLS; c++) {
            if (covered.has(key(r, c))) continue;
            let cls = "dgCell dgBody";
            const clearRanges = [
              ...bgSpecs.map((x) => ({ from: x.from, to: x.to })),
              ...overlayRects.map((x) => ({ from: x.from, to: x.to })),
            ];
            for (const cr of clearRanges) {
              const a = parseRef(cr.from);
              const b = parseRef(cr.to);
              const r1 = Math.min(a.row, b.row);
              const r2 = Math.max(a.row, b.row);
              const c1 = Math.min(a.col, b.col);
              const c2 = Math.max(a.col, b.col);
              if (inRange(r, c, r1, c1, r2, c2)) {
                cls += " dgClear";
                break;
              }
            }
            const el = makeCell(cls, "");
            el.style.gridRow = String(1 + r);
            el.style.gridColumn = String(1 + c);
            frag.appendChild(el);
          }
        }

        root.appendChild(frag);

        const fitText = (el) => {
          const box = el.closest(".dgMergeContent");
          if (!box) return;

          const max = 140;
          const min = 18;

          // available size inside padding
          const padL = parseFloat(getComputedStyle(box).paddingLeft) || 0;
          const padR = parseFloat(getComputedStyle(box).paddingRight) || 0;
          const padT = parseFloat(getComputedStyle(box).paddingTop) || 0;
          const padB = parseFloat(getComputedStyle(box).paddingBottom) || 0;
          const availW = box.clientWidth - padL - padR;
          const availH = box.clientHeight - padT - padB;
          if (availW <= 0 || availH <= 0) return;

          // binary search font-size so it fits both width and height
          let lo = min;
          let hi = max;
          let best = min;

          const fits = (px) => {
            el.style.fontSize = `${px}px`;
            const spans = Array.from(el.querySelectorAll("span"));
            if (spans.length === 0) return false;
            const lineMaxW = Math.max(
              ...spans.map((s) => s.getBoundingClientRect().width)
            );
            const h = el.getBoundingClientRect().height;
            // small safety margin to avoid 1px overflow due to subpixel rounding
            return lineMaxW <= availW - 1 && h <= availH - 1;
          };

          while (lo <= hi) {
            const mid = Math.floor((lo + hi) / 2);
            if (fits(mid)) {
              best = mid;
              lo = mid + 1;
            } else {
              hi = mid - 1;
            }
          }

          el.style.fontSize = `${best}px`;
        };

        const fitAll = () => {
          document
            .querySelectorAll('[data-fit="hero-title"]')
            .forEach((el) => fitText(el));
        };

        fitAll();
        window.addEventListener("resize", fitAll, { passive: true });
      })();
    </script>
  </body>
</html>
